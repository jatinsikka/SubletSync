<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Messages — SubletSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
  <style>
    :root{
      --bg:#faf7f2;--surface:#fff;--surface-alt:#f3ede3;
      --accent:#BF5700;--accent-dark:#8B3A00;--accent-light:rgba(191,87,0,0.08);
      --accent3:#5a8a4f;--text:#1a1510;--muted:#8a7d6b;
      --border:rgba(191,87,0,0.15);--border-solid:#d4c0a8;
      --font-d:'Cormorant Garamond',Georgia,serif;
      --font-b:'Plus Jakarta Sans',-apple-system,sans-serif;
      --r:12px;
      --sh:0 4px 20px rgba(26,21,16,0.08),0 1px 4px rgba(26,21,16,0.04);
      --max:1140px;
      --nav-h:68px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;height:100%}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text);height:100%;overflow:hidden}

    /* Full-height layout under nav */
    .msg-page{
      height:calc(100vh - var(--nav-h));
      display:flex;flex-direction:column;
    }

    .msg-layout{
      display:grid;
      grid-template-columns:320px 1fr;
      flex:1;
      min-height:0; /* allow grid children to scroll */
      max-width:var(--max);
      width:100%;
      margin:0 auto;
      border-left:1px solid var(--border);
      border-right:1px solid var(--border);
    }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .msg-sidebar{
      border-right:1px solid var(--border);
      background:var(--surface);
      display:flex;flex-direction:column;
      min-height:0;overflow:hidden;
    }
    .sidebar-header{
      padding:20px 20px 16px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .sidebar-title{
      font-family:var(--font-d);font-size:1.3rem;font-weight:600;
      color:var(--text);margin-bottom:12px;
    }
    .sidebar-search{
      display:flex;align-items:center;gap:8px;
      padding:8px 12px;background:var(--surface-alt);
      border-radius:8px;border:1px solid var(--border);
    }
    .sidebar-search svg{flex-shrink:0;opacity:0.45}
    .sidebar-search input{
      flex:1;border:none;background:transparent;font-family:var(--font-b);font-size:13px;
      color:var(--text);outline:none;
    }
    .sidebar-search input::placeholder{color:var(--muted)}

    .conv-list{flex:1;overflow-y:auto;overscroll-behavior:contain}
    .conv-item{
      display:flex;align-items:center;gap:12px;
      padding:14px 20px;border-bottom:1px solid var(--border);
      cursor:pointer;transition:background 0.15s;position:relative;
    }
    .conv-item:hover{background:var(--accent-light)}
    .conv-item.active{
      background:var(--accent-light);
      border-left:3px solid var(--accent);
      padding-left:17px;
    }
    .conv-ava{
      width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-size:15px;font-weight:700;flex-shrink:0;font-family:var(--font-b);overflow:hidden;
    }
    .conv-ava img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .conv-body{flex:1;min-width:0}
    .conv-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
    .conv-listing{font-size:11px;color:var(--accent);font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conv-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .conv-time{font-size:10px;color:var(--muted)}
    .unread-badge{
      width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;
      font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;
    }
    .sidebar-empty{padding:48px 20px;text-align:center;color:var(--muted)}
    .sidebar-empty-icon{font-size:36px;margin-bottom:12px;opacity:0.4}
    .sidebar-empty p{font-size:13px;line-height:1.65}
    .sidebar-empty a{color:var(--accent);font-weight:600;text-decoration:none}
    .sidebar-empty a:hover{text-decoration:underline}

    /* ── Thread area ─────────────────────────────────────────── */
    .msg-thread-wrap{
      display:flex;flex-direction:column;
      background:var(--bg);
      min-height:0;overflow:hidden;
    }

    .thread-header{
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:16px 24px;display:flex;align-items:center;gap:14px;
      flex-shrink:0;
    }
    .thread-back-btn{
      display:none;background:none;border:none;font-size:20px;cursor:pointer;
      padding:4px 6px;color:var(--muted);border-radius:6px;transition:background 0.15s;
    }
    .thread-back-btn:hover{background:var(--surface-alt);color:var(--text)}
    .thread-ava{
      width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:700;font-family:var(--font-b);overflow:hidden;flex-shrink:0;
    }
    .thread-ava img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .thread-info{flex:1;min-width:0}
    .thread-name{font-size:15px;font-weight:700;color:var(--text)}
    .thread-listing{font-size:12px;color:var(--accent);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .thread-header-actions{margin-left:auto;flex-shrink:0}
    .thread-listing-link{
      padding:7px 14px;border:1.5px solid var(--border-solid);border-radius:8px;
      font-family:var(--font-b);font-size:12px;font-weight:600;color:var(--text);
      text-decoration:none;transition:all 0.2s;white-space:nowrap;display:inline-block;
    }
    .thread-listing-link:hover{border-color:var(--accent);color:var(--accent)}

    /* Message scroll area */
    .thread-messages{
      flex:1;overflow-y:auto;overscroll-behavior:contain;
      padding:20px 24px;display:flex;flex-direction:column;gap:16px;
    }
    .msg-date-divider{
      text-align:center;font-size:11px;color:var(--muted);font-weight:600;
      letter-spacing:0.04em;text-transform:uppercase;
      display:flex;align-items:center;gap:8px;flex-shrink:0;
    }
    .msg-date-divider::before,.msg-date-divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .msg-row{display:flex;align-items:flex-end;gap:8px}
    .msg-row.mine{flex-direction:row-reverse}
    .msg-ava{
      width:28px;height:28px;border-radius:50%;background:var(--surface-alt);color:var(--muted);
      display:flex;align-items:center;justify-content:center;
      font-size:10px;font-weight:700;flex-shrink:0;font-family:var(--font-b);
    }
    .msg-row.mine .msg-ava{background:var(--accent);color:#fff}
    .msg-bubble-wrap{max-width:68%;display:flex;flex-direction:column;gap:3px}
    .msg-row.mine .msg-bubble-wrap{align-items:flex-end}
    .msg-bubble{
      padding:10px 14px;border-radius:16px;
      font-size:14px;line-height:1.55;
      background:var(--surface);border:1px solid var(--border);color:var(--text);
      border-bottom-left-radius:4px;word-break:break-word;
    }
    .msg-row.mine .msg-bubble{
      background:var(--accent);color:#fff;border-color:var(--accent);
      border-bottom-left-radius:16px;border-bottom-right-radius:4px;
    }
    .msg-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted)}
    .msg-row.mine .msg-meta{flex-direction:row-reverse}
    .read-tick{font-size:11px}
    .read-tick.read{color:var(--accent3)}

    /* Empty / no-conv states */
    .thread-empty{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:40px;text-align:center;color:var(--muted);
    }
    .thread-empty-icon{font-size:52px;margin-bottom:16px;opacity:0.4}
    .thread-empty h3{font-family:var(--font-d);font-size:1.4rem;color:var(--text);margin-bottom:8px}
    .thread-empty p{font-size:13px;line-height:1.6}

    .no-conv{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:40px;text-align:center;color:var(--muted);
    }
    .no-conv-icon{font-size:64px;margin-bottom:20px;opacity:0.3}
    .no-conv h3{font-family:var(--font-d);font-size:1.5rem;color:var(--text);margin-bottom:8px}
    .no-conv p{font-size:13px;line-height:1.6;max-width:260px}
    .no-conv a{color:var(--accent);font-weight:600;text-decoration:none}
    .no-conv a:hover{text-decoration:underline}

    /* Input bar */
    .thread-input-bar{
      background:var(--surface);border-top:1px solid var(--border);
      padding:16px 24px;display:flex;gap:10px;align-items:flex-end;flex-shrink:0;
    }
    .thread-input-bar.hidden{display:none}
    .msg-input{
      flex:1;padding:11px 14px;
      border:1.5px solid var(--border-solid);border-radius:var(--r);
      font-family:var(--font-b);font-size:14px;color:var(--text);
      resize:none;max-height:120px;overflow-y:auto;
      outline:none;transition:border-color 0.2s;line-height:1.5;
    }
    .msg-input:focus{border-color:var(--accent)}
    .msg-input::placeholder{color:var(--muted)}
    .send-btn{
      width:44px;height:44px;border-radius:50%;
      background:var(--accent);color:#fff;
      border:none;cursor:pointer;font-size:18px;
      transition:background 0.2s,transform 0.1s;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .send-btn:hover{background:var(--accent-dark);transform:scale(1.05)}
    .send-btn:disabled{background:var(--muted);cursor:not-allowed;transform:none}

    /* Auth wall */
    .auth-wall{max-width:480px;margin:80px auto;text-align:center;padding:0 24px}
    .auth-wall h2{font-family:var(--font-d);font-size:2rem;color:var(--text);margin-bottom:10px}
    .auth-wall p{color:var(--muted);font-size:15px;margin-bottom:24px;line-height:1.6}
    .auth-wall-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn-ghost-link{padding:12px 24px;border:1.5px solid var(--accent);border-radius:var(--r);color:var(--accent);font-family:var(--font-b);font-size:14px;font-weight:600;text-decoration:none;transition:all 0.2s}
    .btn-ghost-link:hover{background:var(--accent);color:#fff}
    .btn-primary-link{padding:12px 24px;background:var(--accent);border-radius:var(--r);color:#fff;font-family:var(--font-b);font-size:14px;font-weight:700;text-decoration:none;transition:background 0.2s}
    .btn-primary-link:hover{background:var(--accent-dark)}

    /* Mobile responsive */
    @media(max-width:768px){
      body{overflow:auto}
      .msg-page{height:auto;overflow:visible}
      .msg-layout{
        grid-template-columns:1fr;
        height:calc(100vh - var(--nav-h));
        overflow:hidden;
      }
      .msg-sidebar{
        position:absolute;top:var(--nav-h);left:0;right:0;
        bottom:0;z-index:10;background:var(--surface);
      }
      .msg-sidebar.hidden{display:none}
      .msg-thread-wrap{
        position:absolute;top:var(--nav-h);left:0;right:0;bottom:0;
        z-index:10;
      }
      .msg-thread-wrap.hidden{display:none}
      .thread-back-btn{display:block}
    }
  </style>
</head>
<body>
<div id="nav"></div>

<!-- Auth wall (shown when not signed in) -->
<div id="auth-wall" style="display:none">
  <div class="auth-wall">
    <div style="font-size:52px;margin-bottom:20px">🔐</div>
    <h2>Sign in to view messages</h2>
    <p>You need to be signed in to send and receive messages with other students on SubletSync.</p>
    <div class="auth-wall-btns">
      <a href="auth.html" class="btn-ghost-link">Sign in</a>
      <a href="auth.html?mode=signup" class="btn-primary-link">Create account</a>
    </div>
  </div>
</div>

<!-- Main messages app (shown when signed in) -->
<div id="msg-app" style="display:none">
  <div class="msg-page">
    <div class="msg-layout">

      <!-- SIDEBAR -->
      <div class="msg-sidebar" id="msg-sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">Messages</div>
          <div class="sidebar-search">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="7" stroke="#8a7d6b" stroke-width="2"/><path d="M14 14l4 4" stroke="#8a7d6b" stroke-width="2" stroke-linecap="round"/></svg>
            <input type="text" placeholder="Search conversations…" id="conv-search" oninput="filterConvs()" autocomplete="off"/>
          </div>
        </div>
        <div class="conv-list" id="conv-list">
          <!-- populated by JS -->
        </div>
      </div>

      <!-- THREAD AREA -->
      <div class="msg-thread-wrap hidden" id="thread-wrap">
        <div id="thread-header-area" style="flex-shrink:0"></div>
        <div class="thread-messages" id="thread-scroll">
          <!-- populated by JS -->
        </div>
        <div class="thread-input-bar hidden" id="thread-input-bar">
          <textarea class="msg-input" id="msg-input" placeholder="Type a message… (Enter to send, Shift+Enter for new line)" rows="1"
            onkeydown="handleMsgKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" stroke-width="2.2" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.2" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <!-- NO CONV (shown in thread area when no conversation selected, desktop only) -->
      <div class="msg-thread-wrap" id="no-conv-panel">
        <div class="no-conv">
          <div class="no-conv-icon">💬</div>
          <h3>Your messages</h3>
          <p>Select a conversation on the left, or <a href="browse.html">browse listings</a> to start a new one.</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
let currentUser = null;
let allConvs = [];
let activeConv = null; // { listingId, otherUserId, otherName, listingTitle, otherAvatar }
let pollInterval = null;
let realtimeChannel = null;

// ── Init ────────────────────────────────────────────────────────
async function init() {
  await renderNav('messages');
  currentUser = await Auth.getUser();

  if (!currentUser) {
    document.getElementById('auth-wall').style.display = 'block';
    return;
  }

  document.getElementById('msg-app').style.display = 'block';
  await loadConversations();

  // Open conversation from URL params
  const params = new URLSearchParams(location.search);
  const listingId = params.get('listing');
  const userId    = params.get('user');
  const name      = params.get('name')  ? decodeURIComponent(params.get('name'))  : null;
  const title     = params.get('title') ? decodeURIComponent(params.get('title')) : null;

  if (listingId && userId) {
    openConv(listingId, userId, name, title);
  } else {
    // On mobile: show sidebar; on desktop: no-conv panel already visible
    showMobileSidebar();
  }

  setupRealtime();
}

// ── Conversations ───────────────────────────────────────────────
async function loadConversations() {
  const { conversations } = await Messages.getConversations();
  allConvs = conversations;
  renderConvList(conversations);
}

function renderConvList(convs) {
  const el = document.getElementById('conv-list');
  if (!convs.length) {
    el.innerHTML = `
      <div class="sidebar-empty">
        <div class="sidebar-empty-icon">💬</div>
        <p>No conversations yet.<br/><a href="browse.html">Browse listings</a> and message a lister to get started.</p>
      </div>`;
    return;
  }

  // Deduplicate: keep only the latest message per (listing_id + other_user) pair
  const seen = new Map();
  convs.forEach(m => {
    const otherId = m.sender_id === currentUser.id ? m.receiver_id : m.sender_id;
    const key = (m.listing_id || '') + '_' + otherId;
    if (!seen.has(key) || new Date(m.created_at) > new Date(seen.get(key).created_at)) {
      seen.set(key, { ...m, _otherId: otherId });
    }
  });

  el.innerHTML = Array.from(seen.values()).map(m => {
    const otherId = m._otherId;
    const otherName = m.sender_id === currentUser.id
      ? (m.receiver_name || 'Lister')
      : (m.profiles?.name || m.sender_name || 'Student');
    const listingId    = m.listing_id || m.listings?.id || '';
    const listingTitle = m.listings?.title || m.listing_title || 'Listing';
    const isActive     = activeConv && activeConv.listingId === listingId && activeConv.otherUserId === otherId;
    const unread       = !m.read && m.receiver_id === currentUser.id;
    const preview      = escapeHtml((m.content || '').replace(/\n/g, ' '));
    const ava          = m.sender_id === currentUser.id ? null : (m.profiles?.avatar_url || null);

    return `
<div class="conv-item${isActive ? ' active' : ''}" onclick="openConv('${escapeAttr(listingId)}','${escapeAttr(otherId)}','${escapeAttr(otherName)}','${escapeAttr(listingTitle)}')">
  <div class="conv-ava">${ava ? `<img src="${escapeAttr(ava)}" alt="${escapeAttr(otherName)}" onerror="this.style.display='none'">` : ''}${initials(otherName)}</div>
  <div class="conv-body">
    <div class="conv-name">${escapeHtml(otherName)}</div>
    <div class="conv-listing">${escapeHtml(listingTitle)}</div>
    <div class="conv-preview">${preview || '<em>No messages yet</em>'}</div>
  </div>
  <div class="conv-meta">
    <div class="conv-time">${timeAgo(m.created_at)}</div>
    ${unread ? '<div class="unread-badge">1</div>' : ''}
  </div>
</div>`;
  }).join('');
}

function filterConvs() {
  const q = document.getElementById('conv-search').value.toLowerCase();
  if (!q) { renderConvList(allConvs); return; }
  renderConvList(allConvs.filter(m => {
    const otherName    = m.profiles?.name || m.sender_name || m.receiver_name || '';
    const listingTitle = m.listings?.title || m.listing_title || '';
    return otherName.toLowerCase().includes(q)
      || listingTitle.toLowerCase().includes(q)
      || (m.content || '').toLowerCase().includes(q);
  }));
}

// ── Open conversation ────────────────────────────────────────────
async function openConv(listingId, otherUserId, otherName, listingTitle) {
  activeConv = {
    listingId,
    otherUserId,
    otherName: otherName || 'User',
    listingTitle: listingTitle || 'Listing',
  };

  // Update URL (preserve listing/user, drop name/title from URL for cleanliness)
  history.replaceState(null, '', '?listing=' + encodeURIComponent(listingId) + '&user=' + encodeURIComponent(otherUserId));

  // On mobile: hide sidebar, show thread
  showMobileThread();

  // Render header
  renderThreadHeader();

  // Show input bar
  document.getElementById('thread-input-bar').classList.remove('hidden');

  // Load messages
  await loadThread();

  // Re-render conversation list to update active highlight
  renderConvList(allConvs);
}

function renderThreadHeader() {
  if (!activeConv) return;
  document.getElementById('thread-header-area').innerHTML = `
    <div class="thread-header">
      <button class="thread-back-btn" onclick="goBackToSidebar()" title="Back to conversations">&#8592;</button>
      <div class="thread-ava">${initials(activeConv.otherName)}</div>
      <div class="thread-info">
        <div class="thread-name">${escapeHtml(activeConv.otherName)}</div>
        <div class="thread-listing">${escapeHtml(activeConv.listingTitle)}</div>
      </div>
      <div class="thread-header-actions">
        <a href="listing.html?id=${encodeURIComponent(activeConv.listingId)}" class="thread-listing-link" target="_blank">View listing &#8594;</a>
      </div>
    </div>`;
}

// ── Thread messages ──────────────────────────────────────────────
async function loadThread() {
  if (!activeConv) return;
  const scrollEl = document.getElementById('thread-scroll');

  // Loading skeleton
  scrollEl.innerHTML = `
    <div class="thread-empty">
      <div class="thread-empty-icon" style="opacity:0.2;animation:pulse 1.5s ease-in-out infinite">…</div>
    </div>`;

  const { messages } = await Messages.getThread(activeConv.listingId, activeConv.otherUserId);
  renderThread(messages);
}

function renderThread(messages) {
  const scrollEl = document.getElementById('thread-scroll');
  if (!messages || !messages.length) {
    scrollEl.innerHTML = `
      <div class="thread-empty">
        <div class="thread-empty-icon">&#x2709;&#xFE0F;</div>
        <h3>Start the conversation</h3>
        <p>Say hello — ask about move-in dates, utilities, or anything else about the listing.</p>
      </div>`;
    return;
  }

  // Group messages by local date
  const groups = {};
  messages.forEach(m => {
    const d = new Date(m.created_at);
    const today = new Date();
    const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
    let label;
    if (d.toDateString() === today.toDateString()) label = 'Today';
    else if (d.toDateString() === yesterday.toDateString()) label = 'Yesterday';
    else label = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    if (!groups[label]) groups[label] = [];
    groups[label].push(m);
  });

  const html = Object.entries(groups).map(([date, msgs]) => {
    const bubbles = msgs.map(m => {
      const mine   = m.sender_id === currentUser.id;
      const avText = mine
        ? initials(currentUser.user_metadata?.name || currentUser.email)
        : initials(activeConv.otherName);
      const t = new Date(m.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      return `
<div class="msg-row${mine ? ' mine' : ''}">
  <div class="msg-ava">${avText}</div>
  <div class="msg-bubble-wrap">
    <div class="msg-bubble">${escapeHtml(m.content)}</div>
    <div class="msg-meta">
      <span>${t}</span>
      ${mine ? `<span class="read-tick${m.read ? ' read' : ''}" title="${m.read ? 'Read' : 'Sent'}">&#10003;&#10003;</span>` : ''}
    </div>
  </div>
</div>`;
    }).join('');
    return `<div class="msg-date-divider">${escapeHtml(date)}</div>${bubbles}`;
  }).join('');

  scrollEl.innerHTML = html;
  scrollEl.scrollTop = scrollEl.scrollHeight;
}

// ── Send message ────────────────────────────────────────────────
async function sendMessage() {
  if (!activeConv) return;
  const input   = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  input.value  = '';
  autoResize(input);

  const { error } = await Messages.send(activeConv.listingId, activeConv.otherUserId, content);
  btn.disabled = false;

  if (!error) {
    // Optimistic: reload thread and conversation list
    await loadThread();
    await loadConversations();
    renderConvList(allConvs);
  } else {
    // Restore message on failure
    input.value = content;
    autoResize(input);
    alert('Failed to send message. Please try again.');
  }
}

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Mobile panel switching ──────────────────────────────────────
function showMobileSidebar() {
  if (window.innerWidth > 768) return;
  document.getElementById('msg-sidebar').classList.remove('hidden');
  document.getElementById('thread-wrap').classList.add('hidden');
}

function showMobileThread() {
  if (window.innerWidth > 768) {
    // On desktop: just show thread-wrap, hide no-conv panel
    document.getElementById('no-conv-panel').style.display = 'none';
    document.getElementById('thread-wrap').classList.remove('hidden');
    return;
  }
  document.getElementById('msg-sidebar').classList.add('hidden');
  document.getElementById('thread-wrap').classList.remove('hidden');
}

function goBackToSidebar() {
  activeConv = null;
  history.replaceState(null, '', location.pathname);
  showMobileSidebar();
  // On desktop: show no-conv panel
  document.getElementById('no-conv-panel').style.display = '';
  document.getElementById('thread-wrap').classList.add('hidden');
  renderConvList(allConvs);
}

// ── Realtime ─────────────────────────────────────────────────────
function setupRealtime() {
  const sb = getSupabase();
  if (sb && currentUser) {
    try {
      realtimeChannel = sb.channel('user-messages-' + currentUser.id)
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'messages',
          filter: `receiver_id=eq.${currentUser.id}`
        }, async (payload) => {
          // Refresh conversations list
          await loadConversations();
          // If active conv is the one receiving the message, reload thread
          if (activeConv &&
              payload.new.listing_id === activeConv.listingId &&
              payload.new.sender_id  === activeConv.otherUserId) {
            await loadThread();
          }
        })
        .subscribe((status) => {
          if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
            startPollFallback();
          }
        });
    } catch (e) {
      startPollFallback();
    }
  } else {
    startPollFallback();
  }
}

function startPollFallback() {
  if (pollInterval) return; // already polling
  pollInterval = setInterval(async () => {
    await loadConversations();
    if (activeConv) await loadThread();
  }, 10000);
}

// ── Utilities ──────────────────────────────────────────────────
function escapeAttr(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

// ── Cleanup ──────────────────────────────────────────────────────
window.addEventListener('beforeunload', () => {
  if (pollInterval) clearInterval(pollInterval);
  if (realtimeChannel) {
    try { realtimeChannel.unsubscribe(); } catch (e) {}
  }
});

init();
</script>
